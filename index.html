<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XENO WEB EXECUTOR</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #111;
            border-radius: 28px;
            max-width: 700px;
            width: 100%;
            padding: 24px;
            border: 1px solid #ff66cc;
            box-shadow: 0 0 20px rgba(255,102,204,0.2);
        }
        h1 { color: #ff66cc; text-align: center; margin-top: 0; }
        .status-bar {
            background: #1e1e1e;
            border-radius: 40px;
            padding: 8px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        textarea {
            width: 100%;
            height: 220px;
            background: #1a1a1a;
            border: 1px solid #ff66cc;
            border-radius: 20px;
            padding: 16px;
            color: #eee;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            background: #ff66cc;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        button.secondary {
            background: #333;
            color: #ff66cc;
            border: 1px solid #ff66cc;
        }
        .info {
            font-size: 0.75rem;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 16px;
            margin-top: 16px;
            color: #aaa;
        }
        .info span { color: #ff66cc; }
    </style>
</head>
<body>
<div class="card">
    <h1>⚡ XENO WEB EXECUTOR</h1>
    <div class="status-bar">
        <span>🔌 WebSocket</span>
        <span id="wsStatus">Disconnected</span>
    </div>
    <textarea id="scriptInput" placeholder='-- Lua скрипт&#10;print("Hello from Web Executor!")'></textarea>
    <div class="button-group">
        <button id="executeBtn">🚀 EXECUTE (XOR crypt)</button>
        <button id="dumpBtn" class="secondary">🔍 FORCE AUTO-DUMP</button>
    </div>
    <div class="info">
        ⚡ <span>XOR шифрование (0xAA)</span> – скрипт шифруется перед отправкой.<br>
        🔄 <span>Автодамп сигнатур</span> каждые 12 часов + по кнопке.<br>
        🧠 <span>executor.so</span> слушает порт 8081 (WebSocket).
    </div>
</div>

<script>
    function xorEncrypt(plain, key = 0xAA) {
        let result = '';
        for (let i = 0; i < plain.length; i++) {
            result += String.fromCharCode(plain.charCodeAt(i) ^ key);
        }
        return result;
    }

    let ws = null;
    function connectWebSocket() {
        ws = new WebSocket('ws://localhost:8081');
        ws.onopen = () => document.getElementById('wsStatus').innerText = 'Connected';
        ws.onclose = () => {
            document.getElementById('wsStatus').innerText = 'Disconnected';
            setTimeout(connectWebSocket, 3000);
        };
        ws.onerror = () => document.getElementById('wsStatus').innerText = 'Error';
    }
    connectWebSocket();

    document.getElementById('executeBtn').onclick = () => {
        const script = document.getElementById('scriptInput').value;
        if (!script.trim()) return alert('Введи скрипт');
        if (!ws || ws.readyState !== WebSocket.OPEN) return alert('Нет соединения с executor.so');
        const encrypted = xorEncrypt(script, 0xAA);
        ws.send(JSON.stringify({ action: 'execute', script: encrypted }));
    };
    document.getElementById('dumpBtn').onclick = () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return alert('Нет соединения');
        ws.send(JSON.stringify({ action: 'dump' }));
        alert('Запрос на дамп отправлен');
    };
</script>
</body>
</html>
